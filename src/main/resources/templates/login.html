<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ログイン | メニュー提案アプリ</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
          crossorigin="anonymous">
</head>
<body class="container" style="max-width: 480px; margin-top: 60px;">

	<!-- 登録完了メッセージ -->
	<div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
		<span th:text="${successMsg}"></span>
		<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
	</div>

	<h1 class="display-6 mb-4 text-center">ログイン</h1>
	<p class="text-center text-muted" th:text="${msg}"></p>

	<form th:action="@{/login}" method="post">
	  <div class="mb-3">
	    <label class="form-label fw-bold">ユーザー名</label>
	    <input type="text" name="username" class="form-control" placeholder="ユーザー名を入力" required />
	  </div>
	  <div class="mb-3">
	    <label class="form-label fw-bold">パスワード</label>
	    <input type="password" name="password" class="form-control" placeholder="パスワードを入力" required />
	  </div>
	  <div class="d-grid gap-2 mb-3">
	    <input type="submit" value="ログイン" class="btn btn-primary" />
	  </div>
	</form>

	<hr class="my-4">
	<p class="text-center text-muted">
		アカウントをお持ちでない方は
		<a th:href="@{/register}">新規登録</a>
	</p>
	<p class="text-center">
		<a th:href="@{/menu}" class="text-muted small">ログインせずに利用する →</a>
	</p>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
	        integrity="sha384-/mhDoLbDldZc3qpsJHpLogda//BVZbgYuw6kof4u2FrCedxOtgRZDTHgHUhOCVim"
	        crossorigin="anonymous"></script>
</body>
</html>
