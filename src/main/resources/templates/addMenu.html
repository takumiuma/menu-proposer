<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>メニュー追加 | メニュー提案アプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
          crossorigin="anonymous">
    <link href="/style.css" rel="stylesheet">
</head>
<body>
<header>
    <div class="p-3 mb-2 bg-dark-subtle text-emphasis-dark">
        <div class="container">
            <h1 class="text-center">メニューを追加（管理者）</h1>
            <div class="text-end">
                <a th:href="@{/mypage}">マイページ</a>
                &nbsp;|&nbsp;
                <a th:href="@{/logout}">ログアウト</a>
            </div>
        </div>
    </div>
</header>
<main class="container my-4" style="max-width: 640px;">

    <!-- 成功メッセージ -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- エラーメッセージ -->
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/addMenu}" method="post">

        <!-- メニュー名 -->
        <div class="mb-3">
            <label for="menuName" class="form-label fw-bold">メニュー名 <span class="text-danger">*</span></label>
            <input type="text" id="menuName" name="menuName" class="form-control"
                   placeholder="例：カレーライス" required>
        </div>

        <!-- ジャンル -->
        <div class="mb-3">
            <label class="form-label fw-bold">ジャンル <span class="text-danger">*</span></label>
            <div class="border rounded p-3">
                <div th:each="genre : ${allGenres}" class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox"
                           name="genreIds" th:value="${genre.id}"
                           th:id="'genre_' + ${genre.id}">
                    <label class="form-check-label" th:for="'genre_' + ${genre.id}"
                           th:text="${genre.name}"></label>
                </div>
            </div>
        </div>

        <!-- カテゴリ -->
        <div class="mb-4">
            <label class="form-label fw-bold">カテゴリ <span class="text-danger">*</span></label>
            <div class="border rounded p-3">
                <div th:each="category : ${allCategories}" class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox"
                           name="categoryIds" th:value="${category.id}"
                           th:id="'category_' + ${category.id}">
                    <label class="form-check-label" th:for="'category_' + ${category.id}"
                           th:text="${category.name}"></label>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">追加する</button>
            <a th:href="@{/mypage}" class="btn btn-secondary">戻る</a>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-/mhDoLbDldZc3qpsJHpLogda//BVZbgYuw6kof4u2FrCedxOtgRZDTHgHUhOCVim"
        crossorigin="anonymous"></script>
</body>
</html>
